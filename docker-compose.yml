version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb+srv://user:pass@cluster.mongodb.net/qr_attendance
      - BETTER_AUTH_SECRET=production-secret-key-32-chars-min
      - BETTER_AUTH_URL=http://localhost:3000
      - JWT_SECRET=production-jwt-qr-signing-key

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
